<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>German A2 Flashcards</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="flashcard">

        <h1>German A2 Flashcards 🇩🇪</h1>

        <div class="progress">
            1 / 125
        </div>

        <h2>🇬🇧 English</h2>

        <p id="englishSentence">
            I have to go to work tomorrow.
        </p>


        <button id="showAnswerBtn">
            Show Answer
        </button>


        <div id="answer">

            <h2>🇩🇪 German</h2>

            <p id="germanSentence">
                Ich muss morgen zur Arbeit gehen.
            </p>

        </div>


        <div class="navigation">

            <button id="prevBtn">
                ← Previous
            </button>

            <button id="nextBtn">
                Next →
            </button>

        </div>

    </div>

</div>


<script src="script.js"></script>

</body>
</html>
